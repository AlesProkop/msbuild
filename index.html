<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSBuild PerfStar — Orchard Core</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <header>
        <h1>🔬 MSBuild PerfStar — Orchard Core</h1>
        <p class="subtitle" id="headerMeta"></p>
    </header>

    <main>
        <!-- MT vs Standard -->
        <section class="panel">
            <div class="panel-header">
                <h2>Multithreaded vs Standard</h2>
                <div class="controls-inline">
                    <select id="mtBuildType">
                        <option value="inc-build" selected>Incremental Build</option>
                        <option value="rebuild">Rebuild</option>
                    </select>
                    <select id="mtMetric">
                        <option value="build-time" selected>Build Time</option>
                        <option value="evaluation-time">Evaluation Time</option>
                        <option value="benchmarks/build-time">Crank Build Time</option>
                    </select>
                </div>
            </div>
            <div class="chart-wrapper"><canvas id="mtChart"></canvas></div>
            <div class="mt-summary" id="mtSummary"></div>
        </section>

        <!-- Trend -->
        <section class="panel">
            <div class="panel-header">
                <h2>Trend</h2>
                <div class="controls-inline">
                    <select id="trendScenario"></select>
                    <select id="trendMetric">
                        <option value="build-time" selected>Build Time</option>
                        <option value="evaluation-time">Evaluation Time</option>
                        <option value="evaluation-time-pass1">Eval Pass 1</option>
                        <option value="evaluation-time-pass5">Eval Pass 5</option>
                        <option value="benchmarks/build-time">Crank Build Time</option>
                        <option value="benchmarks/working-set">Working Set (MB)</option>
                    </select>
                </div>
            </div>
            <div class="chart-wrapper"><canvas id="trendChart"></canvas></div>
        </section>

        <!-- All Scenarios -->
        <section class="panel">
            <div class="panel-header">
                <h2>Latest — All Scenarios</h2>
            </div>
            <div class="chart-wrapper chart-short"><canvas id="compChart"></canvas></div>
        </section>
    </main>

    <footer>
        <p id="footerInfo"></p>
    </footer>

    <script>
    let DATA = [];
    const CHARTS = {};
    const C = {
        blue: '#3b82f6', green: '#22c55e', amber: '#f59e0b', red: '#ef4444',
        purple: '#a855f7', cyan: '#06b6d4', pink: '#ec4899', lime: '#84cc16',
        blueA: 'rgba(59,130,246,0.12)', greenA: 'rgba(34,197,94,0.12)'
    };
    const BAR_COLORS = [C.blue, C.green, C.amber, C.red, C.purple, C.cyan, C.pink, C.lime];

    function short(s) { return s.replace('orchard-core-','').replace('-dotnet',''); }

    function toSeconds(v, metric) {
        if (v == null || v === '') return null;
        if (metric === 'build-time') return +(v / 1000).toFixed(2);
        if (metric === 'evaluation-time' || metric.startsWith('evaluation-time-'))
            return +(v / 1000000).toFixed(3);
        return +v;
    }

    function unitLabel(metric) {
        if (metric === 'build-time') return 'seconds';
        if (metric === 'evaluation-time' || metric.startsWith('evaluation-time-')) return 'seconds';
        if (metric.includes('working-set') || metric.includes('private-memory')) return 'MB';
        return 'ms';
    }

    function avg(arr) { return arr.length ? arr.reduce((a,b) => a+b, 0) / arr.length : 0; }

    function getSeriesData(scenario, metric) {
        return DATA.filter(d => d.scenario === scenario && d.results[metric] != null && d.results[metric] !== '')
            .sort((a,b) => a.date.localeCompare(b.date))
            .map(d => ({ date: d.date, value: toSeconds(d.results[metric], metric) }))
            .filter(d => d.value !== null);
    }

    function getLatest(scenario) {
        return DATA.filter(d => d.scenario === scenario)
            .sort((a, b) => b.date.localeCompare(a.date))[0];
    }

    function chartOpts(yLabel) {
        return {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: { legend: { labels: { color: '#94a3b8', font: { size: 12 } } } },
            scales: {
                x: { ticks: { color: '#64748b', maxTicksLimit: 12, font: { size: 10 } }, grid: { color: '#1e293b' } },
                y: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' }, title: { display: true, text: yLabel, color: '#94a3b8' } }
            }
        };
    }

    // ── MT vs Standard ──
    function renderMt() {
        const buildType = document.getElementById('mtBuildType').value;
        const metric = document.getElementById('mtMetric').value;

        const stdSeries = getSeriesData(`orchard-core-${buildType}-dotnet`, metric);
        const mtSeries = getSeriesData(`orchard-core-${buildType}-mt-dotnet`, metric);

        const allDates = [...new Set([...stdSeries.map(d=>d.date), ...mtSeries.map(d=>d.date)])].sort();
        const stdMap = Object.fromEntries(stdSeries.map(d => [d.date, d.value]));
        const mtMap = Object.fromEntries(mtSeries.map(d => [d.date, d.value]));

        if (CHARTS.mt) CHARTS.mt.destroy();
        CHARTS.mt = new Chart(document.getElementById('mtChart'), {
            type: 'line',
            data: {
                labels: allDates,
                datasets: [
                    { label: 'Standard', data: allDates.map(d => stdMap[d] ?? null), borderColor: C.blue, backgroundColor: C.blueA, fill: true, tension: 0.3, pointRadius: 2, spanGaps: true },
                    { label: 'Multithreaded', data: allDates.map(d => mtMap[d] ?? null), borderColor: C.green, backgroundColor: C.greenA, fill: true, tension: 0.3, pointRadius: 3, spanGaps: true }
                ]
            },
            options: chartOpts(unitLabel(metric))
        });

        // Summary
        const stdVals = stdSeries.map(d => d.value);
        const mtVals = mtSeries.map(d => d.value);
        let html = `<span><span class="dot blue"></span> Standard avg: <strong>${stdVals.length ? avg(stdVals).toFixed(1) + 's' : 'N/A'}</strong> (${stdVals.length} runs)</span>`;
        html += `<span><span class="dot green"></span> MT avg: <strong>${mtVals.length ? avg(mtVals).toFixed(1) + 's' : 'N/A'}</strong> (${mtVals.length} runs)</span>`;
        if (stdVals.length && mtVals.length) {
            const diff = ((1 - avg(mtVals)/avg(stdVals)) * 100);
            html += `<span>Diff: <strong>${diff > 0 ? '+' : ''}${diff.toFixed(1)}%</strong> ${diff > 0 ? '🟢 faster' : '🔴 slower'}</span>`;
        } else if (mtVals.length === 0) {
            html += `<span class="muted">⚠ No successful MT data for this metric (all MT runs had exit-code 1)</span>`;
        }
        document.getElementById('mtSummary').innerHTML = html;
    }

    // ── Trend ──
    function renderTrend() {
        const scenario = document.getElementById('trendScenario').value;
        const metric = document.getElementById('trendMetric').value;
        const series = getSeriesData(scenario, metric);
        const vals = series.map(d => d.value);
        const mean = avg(vals);

        if (CHARTS.trend) CHARTS.trend.destroy();
        CHARTS.trend = new Chart(document.getElementById('trendChart'), {
            type: 'line',
            data: {
                labels: series.map(d => d.date),
                datasets: [
                    { label: short(scenario), data: vals, borderColor: C.blue, backgroundColor: C.blueA, fill: true, tension: 0.3, pointRadius: 2 },
                    { label: `Avg (${mean.toFixed(1)}s)`, data: vals.map(() => mean), borderColor: C.amber, borderDash: [6,3], pointRadius: 0, fill: false }
                ]
            },
            options: chartOpts(unitLabel(metric))
        });
    }

    // ── All Scenarios Comparison ──
    function renderComp() {
        const scenarios = [...new Set(DATA.map(d => d.scenario))].sort();
        const values = scenarios.map(s => {
            const latest = getLatest(s);
            if (!latest || latest.results['build-time'] == null) return 0;
            return +(latest.results['build-time'] / 1000).toFixed(1);
        });

        if (CHARTS.comp) CHARTS.comp.destroy();
        CHARTS.comp = new Chart(document.getElementById('compChart'), {
            type: 'bar',
            data: {
                labels: scenarios.map(short),
                datasets: [{ label: 'Build Time (s)', data: values, backgroundColor: scenarios.map((_, i) => BAR_COLORS[i % BAR_COLORS.length]), borderRadius: 4 }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color: '#94a3b8', font: { size: 10 } }, grid: { display: false } },
                    y: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' }, title: { display: true, text: 'seconds', color: '#94a3b8' }, beginAtZero: true }
                }
            }
        });
    }

    // ── Init ──
    async function init() {
        const resp = await fetch('data/orchard-core.json');
        DATA = await resp.json();

        const scenarios = [...new Set(DATA.map(d => d.scenario))].sort();
        const sel = document.getElementById('trendScenario');
        scenarios.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = short(s); sel.appendChild(o); });

        const dates = [...new Set(DATA.map(d => d.date))].sort();
        document.getElementById('headerMeta').textContent = `${DATA.length} runs · ${dates[0]} to ${dates[dates.length-1]}`;
        document.getElementById('footerInfo').textContent = `${DATA.length} runs across ${scenarios.length} scenarios · ${dates[0]} to ${dates[dates.length-1]}`;

        renderMt(); renderTrend(); renderComp();

        document.getElementById('mtBuildType').addEventListener('change', renderMt);
        document.getElementById('mtMetric').addEventListener('change', renderMt);
        document.getElementById('trendScenario').addEventListener('change', renderTrend);
        document.getElementById('trendMetric').addEventListener('change', renderTrend);
    }

    init();
    </script>
</body>
</html>
