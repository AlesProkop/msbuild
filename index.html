<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSBuild PerfStar Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <header>
        <h1>📊 MSBuild Performance Dashboard</h1>
        <p id="headerMeta">Loading...</p>
    </header>

    <div class="tabs">
        <button class="tab active" data-view="overview">Overview</button>
        <button class="tab" data-view="health">Health</button>
    </div>

    <!-- ============ OVERVIEW ============ -->
    <div class="view active" id="view-overview">
        <div class="layout">
            <div class="card">
                <div class="controls-row">
                    <label>Asset:</label>
                    <select id="assetSelect"></select>
                    <span id="loadingMsg" style="font-size:12px;color:var(--text-subtle);font-style:italic"></span>
                </div>
            </div>

            <!-- MT vs Standard -->
            <div class="card" id="mtPanel">
                <div class="card-header">Multithreaded vs Standard</div>
                <div class="controls-row">
                    <select id="mtBuildType">
                        <option value="inc-build">Incremental Build</option>
                        <option value="rebuild">Rebuild</option>
                    </select>
                    <select id="mtMetric">
                        <option value="build-time" selected>Build Time</option>
                        <option value="evaluation-time">Evaluation Time</option>
                        <option value="benchmarks/build-time">Crank Build Time</option>
                    </select>
                </div>
                <div class="chart-wrapper"><canvas id="mtChart"></canvas></div>
                <div class="mt-summary" id="mtSummary"></div>
            </div>

            <!-- Trend -->
            <div class="card">
                <div class="card-header">Trend</div>
                <div class="controls-row">
                    <select id="trendScenario"></select>
                    <select id="trendMetric">
                        <option value="build-time" selected>Build Time</option>
                        <option value="evaluation-time">Evaluation Time</option>
                        <option value="evaluation-time-pass1">Eval Pass 1</option>
                        <option value="evaluation-time-pass5">Eval Pass 5</option>
                        <option value="benchmarks/build-time">Crank Build Time</option>
                    </select>
                </div>
                <div class="chart-wrapper"><canvas id="trendChart"></canvas></div>
                <div class="stats-bar" id="trendStats"></div>
            </div>

            <!-- Resources -->
            <div class="card" id="resourcePanel">
                <div class="card-header">Resource Usage — All-Time Averages</div>
                <div class="resource-grid" id="resourceGrid"></div>
            </div>

            <!-- Comparison -->
            <div class="card">
                <div class="card-header">Latest Build Time — All Scenarios</div>
                <div class="chart-wrapper"><canvas id="compChart"></canvas></div>
            </div>
        </div>
    </div>

    <!-- ============ HEALTH ============ -->
    <div class="view" id="view-health">
        <div class="layout">
            <div class="card">
                <div class="card-header">Test Health Summary</div>
                <div class="stats-bar" id="healthStats"></div>
                <div class="health-grid" id="healthGrid"></div>
            </div>

            <div class="card">
                <div class="card-header" id="timelineHeader">Status Timeline</div>
                <div class="timeline-wrapper" id="timelineContainer"></div>
            </div>
        </div>
    </div>

    <footer><p id="footerInfo"></p></footer>

    <script>
    let DATA = [];
    let MANIFEST = [];
    const CHARTS = {};

    const CLR = {
        line: '#656d76',
        lineFill: 'rgba(101,109,118,0.06)',
        mt: '#0969da',
        mtFill: 'rgba(9,105,218,0.06)',
        avg: '#9a6700',
        bar: '#d0d7de'
    };

    function short(s) { return s.replace(/^.*?-(?=inc-build|rebuild)/, '').replace('-dotnet',''); }
    function assetPrefix() {
        if (!DATA.length) return '';
        return DATA[0].scenario.replace(/-(inc-build|rebuild).*$/, '');
    }
    function scenarioList() { return [...new Set(DATA.map(d => d.scenario))].sort(); }
    function avg(arr) { return arr.length ? arr.reduce((a,b) => a+b, 0) / arr.length : 0; }

    // All values stay in ms
    function toMs(v, metric) {
        if (v == null || v === '') return null;
        if (metric === 'evaluation-time' || metric.startsWith('evaluation-time-'))
            return +(v / 1000).toFixed(1); // μs → ms
        return +v;
    }

    function unitLabel() { return 'ms'; }

    function getSeries(scenario, metric) {
        return DATA.filter(d => d.scenario === scenario && d.results[metric] != null && d.results[metric] !== '')
            .sort((a,b) => a.date.localeCompare(b.date))
            .map(d => ({ date: d.date, value: toMs(d.results[metric], metric), exitCode: d.results['exit-code'] }))
            .filter(d => d.value !== null);
    }

    function getLatest(scenario) {
        return DATA.filter(d => d.scenario === scenario).sort((a, b) => b.date.localeCompare(a.date))[0];
    }

    function chartOpts() {
        return {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { labels: { color: '#656d76', font: { size: 11 } } },
                tooltip: {
                    backgroundColor: 'rgba(255,255,255,0.97)',
                    titleColor: '#1f2328', bodyColor: '#1f2328',
                    borderColor: '#d8dee4', borderWidth: 1,
                    cornerRadius: 6, padding: 10,
                    callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(1)} ms` }
                }
            },
            scales: {
                x: { ticks: { color: '#8b949e', maxTicksLimit: 12, font: { size: 10 } }, grid: { color: '#f0f3f6' } },
                y: { ticks: { color: '#8b949e' }, grid: { color: '#f0f3f6' }, title: { display: true, text: 'ms', color: '#8b949e' } }
            }
        };
    }

    // ── Tab switching ──
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('view-' + tab.dataset.view).classList.add('active');
        });
    });

    // ── MT vs Standard ──
    function renderMt() {
        const panel = document.getElementById('mtPanel');
        if (!DATA.some(d => d.scenario.includes('-mt-'))) { panel.style.display = 'none'; return; }
        panel.style.display = '';

        const bt = document.getElementById('mtBuildType').value;
        const metric = document.getElementById('mtMetric').value;
        const asset = assetPrefix();

        const stdS = getSeries(`${asset}-${bt}-dotnet`, metric);
        const mtS = getSeries(`${asset}-${bt}-mt-dotnet`, metric);

        const dates = [...new Set([...stdS.map(d=>d.date), ...mtS.map(d=>d.date)])].sort();
        const stdMap = Object.fromEntries(stdS.map(d => [d.date, d.value]));
        const mtMap = Object.fromEntries(mtS.map(d => [d.date, d.value]));

        if (CHARTS.mt) CHARTS.mt.destroy();
        CHARTS.mt = new Chart(document.getElementById('mtChart'), {
            type: 'line',
            data: {
                labels: dates,
                datasets: [
                    { label: 'Standard', data: dates.map(d => stdMap[d] ?? null), borderColor: CLR.line, backgroundColor: CLR.lineFill, fill: true, tension: 0.3, pointRadius: 2, spanGaps: true, borderWidth: 1.5 },
                    { label: 'Multithreaded', data: dates.map(d => mtMap[d] ?? null), borderColor: CLR.mt, backgroundColor: CLR.mtFill, fill: true, tension: 0.3, pointRadius: 2, spanGaps: true, borderWidth: 1.5 }
                ]
            },
            options: chartOpts()
        });

        const sv = stdS.map(d => d.value), mv = mtS.map(d => d.value);
        let html = `<span><span class="dot std"></span> Std avg: <strong>${sv.length ? avg(sv).toFixed(0) + ' ms' : 'N/A'}</strong> (${sv.length})</span>`;
        html += `<span><span class="dot mt"></span> MT avg: <strong>${mv.length ? avg(mv).toFixed(0) + ' ms' : 'N/A'}</strong> (${mv.length})</span>`;
        if (sv.length && mv.length) {
            const d = ((1 - avg(mv)/avg(sv)) * 100);
            html += `<span>${d > 0 ? '↓' : '↑'} <strong>${Math.abs(d).toFixed(1)}%</strong> ${d > 0 ? 'faster' : 'slower'}</span>`;
        } else if (mv.length === 0) {
            html += `<span class="muted">No successful MT data</span>`;
        }
        document.getElementById('mtSummary').innerHTML = html;
    }

    // ── Trend ──
    function renderTrend() {
        const sc = document.getElementById('trendScenario').value;
        const metric = document.getElementById('trendMetric').value;
        const series = getSeries(sc, metric);
        const vals = series.map(d => d.value);
        const mean = avg(vals);

        if (CHARTS.trend) CHARTS.trend.destroy();
        CHARTS.trend = new Chart(document.getElementById('trendChart'), {
            type: 'line',
            data: {
                labels: series.map(d => d.date),
                datasets: [
                    { label: short(sc), data: vals, borderColor: CLR.line, backgroundColor: CLR.lineFill, fill: true, tension: 0.3, pointRadius: 1.5, borderWidth: 1.5 },
                    { label: `Avg (${mean.toFixed(0)} ms)`, data: vals.map(() => mean), borderColor: CLR.avg, borderDash: [5,3], pointRadius: 0, fill: false, borderWidth: 1 }
                ]
            },
            options: chartOpts()
        });

        // Stats
        const statsEl = document.getElementById('trendStats');
        if (vals.length) {
            statsEl.innerHTML = `
                <div class="stat"><div class="stat-value">${avg(vals).toFixed(0)}</div><div class="stat-label">Avg (ms)</div></div>
                <div class="stat"><div class="stat-value">${Math.min(...vals).toFixed(0)}</div><div class="stat-label">Min (ms)</div></div>
                <div class="stat"><div class="stat-value">${Math.max(...vals).toFixed(0)}</div><div class="stat-label">Max (ms)</div></div>
                <div class="stat"><div class="stat-value">${vals.length}</div><div class="stat-label">Runs</div></div>`;
        } else {
            statsEl.innerHTML = '';
        }
    }

    // ── Resources ──
    function renderResources() {
        const grid = document.getElementById('resourceGrid');
        const metrics = [
            { key: 'benchmarks-cpu-global-avg', label: 'CPU Global', unit: '%' },
            { key: 'benchmarks-working-set-avg', label: 'Working Set', unit: 'MB' },
            { key: 'benchmarks-private-memory-avg', label: 'Private Memory', unit: 'MB' },
            { key: 'benchmarks-cpu-avg', label: 'CPU Process', unit: '%' }
        ];

        let html = '';
        for (const sc of scenarioList()) {
            const recs = DATA.filter(d => d.scenario === sc && d.resourceMetrics);
            if (!recs.length) continue;

            html += `<div class="resource-card"><h4>${short(sc)}</h4>`;
            for (const m of metrics) {
                const vals = recs.map(r => r.resourceMetrics[m.key]).filter(v => v != null);
                if (!vals.length) continue;
                html += `<div class="resource-row">
                    <span class="resource-metric">${m.label}</span>
                    <span><span class="resource-val">${avg(vals).toFixed(1)}</span> <span class="resource-range">${m.unit} (${Math.min(...vals).toFixed(0)}–${Math.max(...vals).toFixed(0)})</span></span>
                </div>`;
            }
            html += `<div class="resource-range" style="margin-top:4px">${recs.length} runs</div></div>`;
        }
        grid.innerHTML = html || '<p class="muted" style="padding:14px">No resource metrics available</p>';
    }

    // ── Comparison ──
    function renderComp() {
        const scs = scenarioList();
        const values = scs.map(s => {
            const latest = getLatest(s);
            return (latest && latest.results['build-time'] != null) ? +latest.results['build-time'].toFixed(0) : 0;
        });

        if (CHARTS.comp) CHARTS.comp.destroy();
        CHARTS.comp = new Chart(document.getElementById('compChart'), {
            type: 'bar',
            data: {
                labels: scs.map(short),
                datasets: [{ label: 'Build Time (ms)', data: values, backgroundColor: CLR.bar, borderRadius: 3 }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y.toFixed(0)} ms` } }
                },
                scales: {
                    x: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { display: false } },
                    y: { ticks: { color: '#8b949e' }, grid: { color: '#f0f3f6' }, title: { display: true, text: 'ms', color: '#8b949e' }, beginAtZero: true }
                }
            }
        });
    }

    // ── Health ──
    function renderHealth() {
        const scs = scenarioList();
        const dates = [...new Set(DATA.map(d => d.date))].sort();

        // Per-scenario health
        let totalRuns = DATA.length;
        let passed = DATA.filter(d => d.results['exit-code'] === 0).length;
        let failed = DATA.filter(d => d.results['exit-code'] != null && d.results['exit-code'] !== 0).length;
        let noData = totalRuns - passed - failed;

        document.getElementById('healthStats').innerHTML = `
            <div class="stat"><div class="stat-value">${totalRuns}</div><div class="stat-label">Total Runs</div></div>
            <div class="stat"><div class="stat-value" style="color:var(--success)">${passed}</div><div class="stat-label">Passed</div></div>
            <div class="stat"><div class="stat-value" style="color:var(--danger)">${failed}</div><div class="stat-label">Failed</div></div>
            <div class="stat"><div class="stat-value">${(totalRuns > 0 ? (failed/totalRuns*100) : 0).toFixed(1)}%</div><div class="stat-label">Failure Rate</div></div>`;

        // Health cards per scenario
        let gridHtml = '';
        for (const sc of scs) {
            const recs = DATA.filter(d => d.scenario === sc);
            const p = recs.filter(d => d.results['exit-code'] === 0).length;
            const f = recs.filter(d => d.results['exit-code'] != null && d.results['exit-code'] !== 0).length;

            // Recent streak
            const sorted = recs.sort((a,b) => b.date.localeCompare(a.date));
            let streak = 0, streakType = '';
            for (const r of sorted) {
                const ec = r.results['exit-code'];
                const status = ec === 0 ? 'pass' : (ec != null ? 'fail' : 'unknown');
                if (!streakType) streakType = status;
                if (status === streakType) streak++;
                else break;
            }

            const statusClass = f === 0 ? 'status-pass' : (p === 0 ? 'status-fail' : 'status-warn');
            const statusText = f === 0 ? '✅ All passing' : (p === 0 ? '❌ All failing' : `⚠ ${f} failures`);

            gridHtml += `<div class="health-item">
                <h4>${short(sc)}</h4>
                <div class="health-status ${statusClass}">${statusText}</div>
                <div class="health-detail">${p}/${recs.length} passed · streak: ${streak} ${streakType}</div>
            </div>`;
        }
        document.getElementById('healthGrid').innerHTML = gridHtml;

        // Timeline heatmap
        const recentDates = dates.slice(-30);
        document.getElementById('timelineHeader').textContent = `Status Timeline (last ${recentDates.length} dates)`;

        // Build lookup: scenario → date → exit-code
        const lookup = {};
        DATA.forEach(d => {
            if (!lookup[d.scenario]) lookup[d.scenario] = {};
            lookup[d.scenario][d.date] = d.results['exit-code'];
        });

        let tlHtml = '<div class="timeline-legend">';
        tlHtml += '<div class="timeline-legend-item"><div class="tl-legend-dot tl-pass"></div> Pass</div>';
        tlHtml += '<div class="timeline-legend-item"><div class="tl-legend-dot tl-fail"></div> Fail</div>';
        tlHtml += '<div class="timeline-legend-item"><div class="tl-legend-dot tl-none"></div> No data</div>';
        tlHtml += '</div>';

        for (const sc of scs) {
            tlHtml += `<div class="timeline-row">
                <div class="timeline-label" title="${sc}">${short(sc)}</div>
                <div class="timeline-dots">`;
            for (const date of recentDates) {
                const ec = lookup[sc]?.[date];
                let cls, title;
                if (ec === 0) { cls = 'tl-pass'; title = `${date}: Pass`; }
                else if (ec != null) { cls = 'tl-fail'; title = `${date}: Failed (exit ${ec})`; }
                else { cls = 'tl-none'; title = `${date}: No data`; }
                tlHtml += `<div class="tl-dot ${cls}" title="${title}"></div>`;
            }
            tlHtml += '</div></div>';
        }
        document.getElementById('timelineContainer').innerHTML = tlHtml;
    }

    // ── Load asset ──
    async function loadAsset(name) {
        document.getElementById('loadingMsg').textContent = 'Loading...';
        const resp = await fetch(`data/${name}.json`);
        DATA = await resp.json();
        document.getElementById('loadingMsg').textContent = '';

        const sel = document.getElementById('trendScenario');
        sel.innerHTML = '';
        scenarioList().forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = short(s); sel.appendChild(o); });

        const dates = [...new Set(DATA.map(d => d.date))].sort();
        document.getElementById('headerMeta').textContent = `${name} · ${DATA.length} runs · ${dates[0]} to ${dates[dates.length-1]}`;
        document.getElementById('footerInfo').textContent = `${DATA.length} runs · ${dates[0]} to ${dates[dates.length-1]} · MSBuild PerfStar CI`;

        renderMt(); renderTrend(); renderResources(); renderComp(); renderHealth();
    }

    // ── Init ──
    async function init() {
        const resp = await fetch('data/manifest.json');
        MANIFEST = await resp.json();
        MANIFEST.sort((a, b) => b.records - a.records);

        const sel = document.getElementById('assetSelect');
        MANIFEST.forEach(a => {
            if (a.name === 'sample-orchard-core') return;
            const o = document.createElement('option');
            o.value = a.name;
            o.textContent = `${a.name} (${a.records})`;
            sel.appendChild(o);
        });
        sel.addEventListener('change', () => loadAsset(sel.value));

        sel.value = 'orchard-core';
        await loadAsset('orchard-core');
    }

    document.getElementById('mtBuildType').addEventListener('change', renderMt);
    document.getElementById('mtMetric').addEventListener('change', renderMt);
    document.getElementById('trendScenario').addEventListener('change', renderTrend);
    document.getElementById('trendMetric').addEventListener('change', renderTrend);

    init();
    </script>
</body>
</html>
